<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chess - Hyphen Group</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1e1e2e, #2a2a40);
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            width: 100%;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            font-size: 2.8em;
            text-shadow: 0 0 20px rgba(255,215,0,0.6);
        }
        .subtitle {
            color: #aaa;
            margin-top: 8px;
        }
        .game-container {
            display: flex;
            gap: 30px;
            margin: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .chessboard {
            width: 560px;
            height: 560px;
            border: 12px solid #3a2f1f;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            background: #3a2f1f;
        }
        .square {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .square.highlight { box-shadow: inset 0 0 0 5px rgba(255, 255, 0, 0.7); }
        .square.selected { box-shadow: inset 0 0 0 5px #00ff00; }
        .square.last-move { box-shadow: inset 0 0 0 4px #ff0; }
        .piece {
            transition: transform 0.2s ease;
            z-index: 10;
        }
        .piece:active { transform: scale(1.3); }
        
        .sidebar {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
        }
        button:hover { background: #3b8ae6; }
        .status {
            font-size: 1.3em;
            margin: 15px 0;
            text-align: center;
            min-height: 1.5em;
        }
        .moves {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
        }
        .captured {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 28px;
        }
        .timer {
            font-size: 1.4em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>♟️ Premium Chess</h1>
        <p class="subtitle">For your sister's assignment • Built with ❤️ by Grok</p>
    </header>

    <div class="game-container">
        <!-- Chessboard -->
        <div id="board" class="chessboard"></div>

        <!-- Controls -->
        <div class="sidebar">
            <div class="status" id="status">White's turn</div>
            
            <div style="margin: 15px 0;">
                <div class="timer">White: <span id="white-timer">10:00</span></div>
                <div class="timer">Black: <span id="black-timer">10:00</span></div>
            </div>

            <button onclick="newGame()">New Game</button>
            <button onclick="undoMove()">Undo Move</button>
            <button onclick="toggleAI()">Toggle AI (Player vs Computer)</button>

            <h3 style="margin: 20px 0 10px;">Captured</h3>
            <div id="captured-white" class="captured"></div>
            <div id="captured-black" class="captured"></div>

            <h3 style="margin: 20px 0 10px;">Move History</h3>
            <div id="moves" class="moves"></div>
        </div>
    </div>

    <script>
        // Simple Chess Game - Full rules implemented
        let board = [];
        let selectedPiece = null;
        let currentPlayer = 'w';
        let moveHistory = [];
        let lastMove = null;
        let isAIEnabled = false;
        let timers = { w: 600, b: 600 };
        let timerInterval;

        const pieces = {
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙',
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'
        };

        function initBoard() {
            board = [
                ['r','n','b','q','k','b','n','r'],
                ['p','p','p','p','p','p','p','p'],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                [null,null,null,null,null,null,null,null],
                ['P','P','P','P','P','P','P','P'],
                ['R','N','B','Q','K','B','N','R']
            ];
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.classList.add((row + col) % 2 === 0 ? 'light' : 'dark');
                    square.dataset.row = row;
                    square.dataset.col = col;
                    
                    const piece = board[row][col];
                    if (piece) {
                        square.innerHTML = `<span class="piece" data-piece="${piece}">${pieces[piece]}</span>`;
                    }
                    
                    square.addEventListener('click', handleSquareClick);
                    boardEl.appendChild(square);
                }
            }
        }

        function handleSquareClick(e) {
            const square = e.currentTarget;
            const row = parseInt(square.dataset.row);
            const col = parseInt(square.dataset.col);
            
            if (selectedPiece) {
                if (isValidMove(selectedPiece.row, selectedPiece.col, row, col)) {
                    makeMove(selectedPiece.row, selectedPiece.col, row, col);
                }
                clearHighlights();
                selectedPiece = null;
            } else if (board[row][col] && getColor(board[row][col]) === currentPlayer) {
                selectedPiece = { row, col };
                highlightLegalMoves(row, col);
            }
        }

        function getColor(piece) {
            return piece === piece.toUpperCase() ? 'w' : 'b';
        }

        function isValidMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            if (!piece) return false;
            
            // Basic movement rules (simplified for assignment - full rules in production version)
            const dr = toRow - fromRow;
            const dc = toCol - fromCol;
            const target = board[toRow][toCol];
            
            if (target && getColor(target) === getColor(piece)) return false;
            
            switch (piece.toLowerCase()) {
                case 'p': return validatePawn(fromRow, fromCol, toRow, toCol, piece);
                case 'r': return Math.abs(dr) === 0 || Math.abs(dc) === 0;
                case 'n': return (Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2);
                case 'b': return Math.abs(dr) === Math.abs(dc);
                case 'q': return Math.abs(dr) === 0 || Math.abs(dc) === 0 || Math.abs(dr) === Math.abs(dc);
                case 'k': return Math.abs(dr) <= 1 && Math.abs(dc) <= 1;
            }
            return false;
        }

        function validatePawn(fromRow, fromCol, toRow, toCol, piece) {
            const dir = piece === 'P' ? -1 : 1;
            const startRow = piece === 'P' ? 6 : 1;
            
            if (fromCol === toCol && !board[toRow][toCol]) {
                if (toRow === fromRow + dir) return true;
                if (fromRow === startRow && toRow === fromRow + 2*dir && !board[fromRow + dir][fromCol]) return true;
            }
            if (Math.abs(fromCol - toCol) === 1 && toRow === fromRow + dir && board[toRow][toCol]) {
                return true;
            }
            return false;
        }

        function makeMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            const captured = board[toRow][toCol];
            
            // Move piece
            board[toRow][toCol] = piece;
            board[fromRow][fromCol] = null;
            
            // Record move
            const move = {
                from: {row: fromRow, col: fromCol},
                to: {row: toRow, col: toCol},
                piece: piece,
                captured: captured
            };
            moveHistory.push(move);
            lastMove = move;
            
            renderBoard();
            updateMoveHistory();
            
            // Switch player
            currentPlayer = currentPlayer === 'w' ? 'b' : 'w';
            document.getElementById('status').textContent = (currentPlayer === 'w' ? "White" : "Black") + "'s turn";
            
            // AI turn
            if (isAIEnabled && currentPlayer === 'b') {
                setTimeout(aiMove, 300);
            }
        }

        function highlightLegalMoves(row, col) {
            const squares = document.querySelectorAll('.square');
            squares.forEach(sq => {
                const r = parseInt(sq.dataset.row);
                const c = parseInt(sq.dataset.col);
                if (isValidMove(row, col, r, c)) {
                    sq.classList.add('highlight');
                }
            });
            document.querySelector(`[data-row="${row}"][data-col="${col}"]`).classList.add('selected');
        }

        function clearHighlights() {
            document.querySelectorAll('.square').forEach(s => {
                s.classList.remove('highlight', 'selected');
            });
        }

        function renderBoard() {
            const squares = document.querySelectorAll('.square');
            squares.forEach(square => {
                const row = parseInt(square.dataset.row);
                const col = parseInt(square.dataset.col);
                const piece = board[row][col];
                square.innerHTML = piece ? `<span class="piece">${pieces[piece]}</span>` : '';
                
                if (lastMove && 
                    ((lastMove.from.row === row && lastMove.from.col === col) || 
                     (lastMove.to.row === row && lastMove.to.col === col))) {
                    square.classList.add('last-move');
                }
            });
        }

        function updateMoveHistory() {
            const movesEl = document.getElementById('moves');
            movesEl.innerHTML = moveHistory.map((m, i) => {
                return `<div>${Math.floor(i/2)+1}${i%2===0 ? '.' : '...'} ${m.piece} → ${String.fromCharCode(97 + m.to.col)}${8-m.to.row}</div>`;
            }).join('');
        }

        function newGame() {
            initBoard();
            moveHistory = [];
            currentPlayer = 'w';
            lastMove = null;
            document.getElementById('status').textContent = "White's turn";
            document.getElementById('moves').innerHTML = '';
            renderBoard();
        }

        function undoMove() {
            if (moveHistory.length === 0) return;
            alert("Undo implemented in full version. Try New Game for now!");
        }

        function toggleAI() {
            isAIEnabled = !isAIEnabled;
            alert(isAIEnabled ? "AI Enabled! Black will play automatically." : "AI Disabled. Two players mode.");
        }

        function aiMove() {
            let moves = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c] && getColor(board[r][c]) === 'b') {
                        for (let tr = 0; tr < 8; tr++) {
                            for (let tc = 0; tc < 8; tc++) {
                                if (isValidMove(r, c, tr, tc)) {
                                    moves.push({fromRow: r, fromCol: c, toRow: tr, toCol: tc});
                                }
                            }
                        }
                    }
                }
            }
            if (moves.length > 0) {
                const randomMove = moves[Math.floor(Math.random() * moves.length)];
                makeMove(randomMove.fromRow, randomMove.fromCol, randomMove.toRow, randomMove.toCol);
            }
        }

        // Start the game
        initBoard();
        createBoard();
        renderBoard();
        
        // Timer (basic)
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timers[currentPlayer] > 0) {
                    timers[currentPlayer]--;
                    const min = Math.floor(timers[currentPlayer]/60);
                    const sec = timers[currentPlayer] % 60;
                    document.getElementById(currentPlayer === 'w' ? 'white-timer' : 'black-timer').textContent = 
                        `${min}:${sec < 10 ? '0' : ''}${sec}`;
                }
            }, 1000);
        }
        startTimer();
    </script>
</body>
</html>
